<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電話依頼</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565c0">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;}
body{background:#eef3f8;margin:0;padding-bottom:60px;font-family:Arial,"Hiragino Sans",sans-serif;}
header{background:#1565c0;color:white;padding:20px 10px;text-align:center;position:relative;}
header h1{font-size:26px;margin:0;}
.gear{position:absolute;top:16px;right:16px;background:none;border:none;color:white;font-size:26px;cursor:pointer;}
.installIconBtn{position:absolute;top:16px;left:16px;background:none;border:none;color:white;font-size:26px;cursor:pointer;}
.wrap{max-width:640px;margin:0 auto;padding:16px;}
.sectionLabel{display:inline-block;font-size:18px;font-weight:bold;padding:10px 22px;border-radius:14px;margin:16px 0 10px;color:white;}
.sectionLabel.pending{background:#e53935;}
.sectionLabel.doneLabel{background:#2e9d45;}
.reqCard{background:white;border-radius:14px;box-shadow:0 2px 6px rgba(0,0,0,.1);padding:18px;margin-bottom:10px;cursor:pointer;}
.reqCard.done{opacity:.6;}
.reqTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.reqDate{font-size:18px;color:#444;font-weight:bold;}
.badge{font-size:15px;font-weight:bold;padding:8px 18px;border-radius:999px;color:white;border:none;cursor:pointer;}
.badge.pending{background:#e53935;}
.badge.done{background:#2e9d45;}
.reqClient{font-size:23px;font-weight:bold;color:#222;margin-bottom:6px;}
.reqContent{font-size:16px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.empty{text-align:center;color:#888;font-size:15px;margin:24px 0;}
.fab{position:fixed;right:20px;bottom:20px;width:60px;height:60px;border-radius:50%;background:#1565c0;color:white;border:none;font-size:28px;box-shadow:0 4px 10px rgba(0,0,0,.3);z-index:500;}
/* 詳細モーダル */
.modalScreen{display:none;position:fixed;inset:0;background:#eef3f8;z-index:998;overflow-y:auto;}
.modalScreen.show{display:block;}
.modalHeader{background:#1565c0;color:white;padding:18px 10px;text-align:center;position:relative;}
.modalHeader h2{font-size:20px;margin:0;}
.modalClose{position:absolute;top:16px;left:14px;background:none;border:none;color:white;font-size:17px;font-weight:bold;cursor:pointer;}
.modalBox{max-width:640px;margin:20px auto;background:white;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.detailRow{font-size:17px;line-height:1.9;color:#222;margin-bottom:6px;}
.detailRow b{color:#333;}
.statusBtnGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0 10px;}
.statusBtn{padding:16px;border:none;border-radius:14px;font-size:17px;font-weight:bold;color:white;}
.statusBtn.toDone{background:#2e9d45;}
.statusBtn.toPending{background:#e53935;}
.shareBtnGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.shareBtn{padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:bold;color:white;}
.shareBtn.line{background:#06c755;}
.shareBtn.print{background:#555;}
.deleteBtn{width:100%;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:bold;color:white;background:#333;margin-top:8px;}
/* 設定（入力フォーム）画面 */
.settingsScreen{display:none;position:fixed;inset:0;background:#eef3f8;z-index:999;overflow-y:auto;}
.settingsScreen.show{display:block;}
.setHeader{background:#1565c0;color:white;padding:18px 10px;text-align:center;position:relative;}
.setHeader h2{font-size:20px;margin:0;}
.closeSet{position:absolute;top:14px;left:14px;background:none;border:none;color:white;font-size:26px;cursor:pointer;}
.box{background:white;margin:16px auto;padding:20px;border-radius:16px;max-width:640px;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.field{margin-bottom:18px;}
.field label{display:block;font-size:17px;font-weight:bold;margin-bottom:8px;color:#333;}
.field input[type=text],.field input[type=tel],.field input[type=date],.field input[type=number],.field textarea,.field select{
width:100%;font-size:19px;padding:13px;border-radius:12px;border:1px solid #aaa;
}
.checkGroup{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.checkGroup label{
display:flex;align-items:center;gap:8px;
background:#f0f4f8;border:2px solid #ccc;border-radius:12px;padding:12px 10px;
font-size:16px;font-weight:bold;color:#333;cursor:pointer;
}
.checkGroup input{transform:scale(1.3);}
.checkGroup label.checked{background:#1565c0;color:white;border-color:#1565c0;}
.radioGroup{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.radioGroup label{
display:flex;align-items:center;justify-content:center;gap:8px;
background:#f0f4f8;border:2px solid #ccc;border-radius:12px;padding:14px 6px;
font-size:17px;font-weight:bold;color:#333;cursor:pointer;
}
.radioGroup input{transform:scale(1.3);}
.radioGroup label.checked{background:#1565c0;color:white;border-color:#1565c0;}
.itemsGrid{display:grid;grid-template-columns:1fr 90px auto;gap:10px;align-items:center;margin-bottom:12px;}
.itemsGrid span{font-size:17px;font-weight:bold;color:#333;}
.itemsGrid input[type=number]{padding:12px 8px;font-size:18px;}
.itemsGrid .unit{font-size:15px;color:#666;}
.otherRow{display:flex;gap:10px;align-items:center;}
.otherRow input{flex:1;}
.btnGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
.actionBtn{padding:18px;border:none;border-radius:16px;font-size:19px;font-weight:bold;color:white;}
.save{background:#2e9d45;}
.install{background:#ff9800;}
.clear{background:#e53935;}
.back{background:#888;grid-column:1/3;}
.savedMsg{display:none;background:#e8f8ec;color:#1b7d34;border:2px solid #2e9d45;border-radius:12px;padding:14px;text-align:center;font-size:18px;font-weight:bold;margin-bottom:16px;}
.printOnly{display:none;}
@media print{
body *{display:none !important;}
#printBox,#printBox *{display:block !important;}
body{background:white;padding-bottom:0;}
.box{box-shadow:none;border:1px solid #333;}
}
</style>
</head>
<body>
<header>
<button class="installIconBtn" id="installIconBtn" style="display:none;" onclick="installApp()">📲</button>
<h1>📞 電話依頼</h1>
<button class="gear" onclick="openSettings()">⚙️</button>
</header>
<div class="wrap">
<div class="sectionLabel pending">🔴 未対応</div>
<div id="pendingList"></div>
<div class="sectionLabel doneLabel">✅ 対応済み</div>
<div id="doneList"></div>
</div>
<button class="fab" onclick="openSettings()">＋</button>

<!-- 詳細モーダル -->
<div class="modalScreen" id="modalScreen">
<div class="modalHeader">
<button class="modalClose" onclick="closeModal()">← 戻る</button>
<h2>依頼の詳細</h2>
</div>
<div class="modalBox" id="modalBox"></div>
</div>

<!-- 設定（入力フォーム）画面 -->
<div class="settingsScreen" id="settingsScreen">
<div class="setHeader">
<button class="closeSet" onclick="closeSettings()">←</button>
<h2>新しい依頼を入力</h2>
</div>
<div class="box" id="mainBox">
<div class="savedMsg" id="savedMsg">✅ 保存しました</div>

<div class="field">
<label>依頼日</label>
<input type="date" id="requestDate">
</div>

<div class="field">
<label>引取先</label>
<input type="text" id="clientName" placeholder="例：〇〇商店">
</div>

<div class="field">
<label>取引先部署</label>
<input type="text" id="clientDept" placeholder="例：営業部">
</div>

<div class="field">
<label>担当者名</label>
<input type="text" id="clientContact" placeholder="例：山田様">
</div>

<div class="field">
<label>電話番号</label>
<input type="tel" id="phone" placeholder="例：0263-00-0000">
</div>

<div class="field">
<label>電話受付者</label>
<select id="staffSelect"></select>
</div>

<div class="field">
<label>依頼内容</label>
<div class="checkGroup" id="contentGroup">
<label><input type="checkbox" value="電話欲しい">電話欲しい</label>
<label><input type="checkbox" value="メール欲しい">メール欲しい</label>
<label><input type="checkbox" value="引き取り希望">引き取り希望</label>
<label><input type="checkbox" value="その他">その他</label>
</div>
</div>

<div class="field">
<label>対応内容</label>
<textarea id="responseText" rows="4" placeholder="対応した内容・連絡事項を自由に入力"></textarea>
</div>

<div class="field">
<label>回収予定日</label>
<input type="date" id="pickupDate">
</div>

<div class="field">
<label>時間</label>
<div class="radioGroup" id="ampmGroup">
<label><input type="radio" name="ampm" value="午前">午前</label>
<label><input type="radio" name="ampm" value="午後">午後</label>
</div>
</div>

<div class="field">
<label>持ち物</label>
<div class="itemsGrid">
<span>穴ありドラム缶</span><input type="number" id="itemHoleDrum" min="0" value="0"><span class="unit">本</span>
<span>穴なしドラム缶</span><input type="number" id="itemNoHoleDrum" min="0" value="0"><span class="unit">本</span>
<span>フレコン</span><input type="number" id="itemFlexBag" min="0" value="0"><span class="unit">枚</span>
<span>箱</span><input type="number" id="itemBox" min="0" value="0"><span class="unit">個</span>
</div>
<div class="otherRow">
<span style="font-size:16px;font-weight:bold;color:#333;white-space:nowrap;">その他</span>
<input type="text" id="itemOther" placeholder="品名・数量など">
</div>
</div>

<div class="btnGrid">
<button class="actionBtn save" onclick="saveRequest()">💾 保存する</button>
<button class="actionBtn clear" onclick="clearForm()">🗑 入力クリア</button>
<button class="actionBtn" style="background:#06c755;" onclick="shareFormLine()">📱 ライン</button>
<button class="actionBtn" style="background:#555;" onclick="printFormOnly()">🖨 印刷</button>
<button class="actionBtn install" id="installBtn" style="display:none;grid-column:1/3;" onclick="installApp()">📲 アプリを追加</button>
<button class="actionBtn back" onclick="closeSettings()">← 戻る</button>
</div>
</div>
</div>

<!-- 印刷/PDF用レイアウト -->
<div class="box printOnly" id="printBox">
<h2 style="text-align:center;color:#000;font-weight:900;-webkit-print-color-adjust:exact;print-color-adjust:exact;">電話依頼票</h2>
<div style="font-size:18px;line-height:2;color:#000;" id="printBoxBody"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const firebaseConfig={
apiKey:"AIzaSyD99MxOMnGplSQjV7830bS7-gdCBSM9DGY",
authDomain:"sekine-store.firebaseapp.com",
projectId:"sekine-store",
storageBucket:"sekine-store.firebasestorage.app",
messagingSenderId:"781856496751",
appId:"1:781856496751:web:e2e1e5de4cd803415a819a"
};
if(!firebase.apps.length){firebase.initializeApp(firebaseConfig);}
const db=firebase.firestore();
const colRef=db.collection("phoneRequests");
const defaultStaff=["未選択","古川","石原","宮嶋","長村","川村"];
const TWO_DAYS_MS=2*24*60*60*1000;
let requestCache=[];
let currentDetailId=null;

function todayStr(){
const d=new Date();
const y=d.getFullYear();
const m=String(d.getMonth()+1).padStart(2,"0");
const day=String(d.getDate()).padStart(2,"0");
return y+"-"+m+"-"+day;
}

function loadStaff(){
const sel=document.getElementById("staffSelect");
sel.innerHTML="";
defaultStaff.forEach(function(name){
const op=document.createElement("option");
op.value=name;op.textContent=name;
sel.appendChild(op);
});
}

document.querySelectorAll("#contentGroup input[type=checkbox]").forEach(function(cb){
cb.addEventListener("change",function(){
cb.closest("label").classList.toggle("checked",cb.checked);
});
});

document.querySelectorAll("#ampmGroup input[type=radio]").forEach(function(r){
r.addEventListener("change",function(){
document.querySelectorAll("#ampmGroup label").forEach(l=>l.classList.remove("checked"));
r.closest("label").classList.add("checked");
});
});

function collectData(){
const staff=document.getElementById("staffSelect").value;
const client=document.getElementById("clientName").value.trim();
const contents=Array.from(document.querySelectorAll("#contentGroup input:checked")).map(cb=>cb.value);
const ampmEl=document.querySelector("#ampmGroup input[name=ampm]:checked");
return {
requestDate:document.getElementById("requestDate").value,
client:client,
clientDept:document.getElementById("clientDept").value.trim(),
clientContact:document.getElementById("clientContact").value.trim(),
staff:staff,
phone:document.getElementById("phone").value.trim(),
contents:contents,
responseText:document.getElementById("responseText").value.trim(),
pickupDate:document.getElementById("pickupDate").value,
ampm:ampmEl?ampmEl.value:"",
items:{
holeDrum:Number(document.getElementById("itemHoleDrum").value||0),
noHoleDrum:Number(document.getElementById("itemNoHoleDrum").value||0),
flexBag:Number(document.getElementById("itemFlexBag").value||0),
box:Number(document.getElementById("itemBox").value||0),
other:document.getElementById("itemOther").value.trim()
}
};
}

function validate(data){
if(!data.client){alert("引取先を入力してください");return false;}
if(!data.staff||data.staff==="未選択"){alert("電話受付者を選んでください");return false;}
return true;
}

function itemsSummaryText(items){
const parts=[];
if(items.holeDrum>0)parts.push("穴ありドラム缶 "+items.holeDrum+"本");
if(items.noHoleDrum>0)parts.push("穴なしドラム缶 "+items.noHoleDrum+"本");
if(items.flexBag>0)parts.push("フレコン "+items.flexBag+"枚");
if(items.box>0)parts.push("箱 "+items.box+"個");
if(items.other)parts.push("その他："+items.other);
return parts.length?parts.join("、"):"なし";
}

function escapeHtml(s){
return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function buildSummaryLines(data){
const lines=[];
if(data.requestDate)lines.push("依頼日："+data.requestDate);
lines.push("引取先："+data.client);
if(data.clientDept)lines.push("取引先部署："+data.clientDept);
if(data.clientContact)lines.push("担当者名："+data.clientContact);
if(data.phone)lines.push("電話番号："+data.phone);
lines.push("電話受付者："+data.staff);
if(data.contents && data.contents.length)lines.push("依頼内容："+data.contents.join("、"));
if(data.responseText)lines.push("対応内容："+data.responseText);
if(data.pickupDate)lines.push("回収予定日："+data.pickupDate+(data.ampm?"（"+data.ampm+"）":""));
const itemsText=itemsSummaryText(data.items||{});
if(itemsText!=="なし")lines.push("持ち物："+itemsText);
return lines;
}

function contentPreview(data){
if(data.contents && data.contents.length)return data.contents.join("、");
if(data.responseText)return data.responseText;
return "（内容なし）";
}

// ==== 保存 ====
function saveRequest(){
const data=collectData();
if(!validate(data))return;
const record=Object.assign({},data,{
status:"未対応",
createdAt:firebase.firestore.FieldValue.serverTimestamp(),
createdAtText:new Date().toLocaleString()
});
colRef.add(record).then(function(){
const msg=document.getElementById("savedMsg");
msg.style.display="block";
setTimeout(function(){msg.style.display="none";},2500);
clearForm();
}).catch(function(){
alert("保存に失敗しました。通信を確認してください。");
});
}

function shareFormLine(){
const data=collectData();
if(!validate(data))return;
const text="【電話依頼】\n"+buildSummaryLines(data).join("\n");
const url="https://line.me/R/msg/text/?"+encodeURIComponent(text);
window.open(url,"_blank");
}

function printFormOnly(){
const data=collectData();
if(!validate(data))return;
fillPrintBox(data);
window.print();
}

function clearForm(){
document.getElementById("requestDate").value=todayStr();
document.getElementById("clientName").value="";
document.getElementById("clientDept").value="";
document.getElementById("clientContact").value="";
document.getElementById("staffSelect").value="未選択";
document.getElementById("phone").value="";
document.querySelectorAll("#contentGroup input[type=checkbox]").forEach(function(cb){
cb.checked=false;
cb.closest("label").classList.remove("checked");
});
document.getElementById("responseText").value="";
document.getElementById("pickupDate").value="";
document.querySelectorAll("#ampmGroup input[type=radio]").forEach(function(r){
r.checked=false;
r.closest("label").classList.remove("checked");
});
document.getElementById("itemHoleDrum").value=0;
document.getElementById("itemNoHoleDrum").value=0;
document.getElementById("itemFlexBag").value=0;
document.getElementById("itemBox").value=0;
document.getElementById("itemOther").value="";
}

// ==== 一覧表示 ====
function renderLists(){
const pendingBox=document.getElementById("pendingList");
const doneBox=document.getElementById("doneList");
const pending=requestCache.filter(function(r){return r.status!=="対応済み";})
.sort(function(a,b){return (b.requestDate||"").localeCompare(a.requestDate||"");});
const done=requestCache.filter(function(r){return r.status==="対応済み";})
.sort(function(a,b){return (b.requestDate||"").localeCompare(a.requestDate||"");});
if(pending.length===0){
pendingBox.innerHTML="<div class='empty'>未対応の依頼はありません</div>";
}else{
pendingBox.innerHTML=pending.map(renderCard).join("");
}
if(done.length===0){
doneBox.innerHTML="<div class='empty'>対応済みの依頼はありません</div>";
}else{
doneBox.innerHTML=done.map(renderCard).join("");
}
}

function renderCard(item){
const isDone=item.status==="対応済み";
return "<div class='reqCard"+(isDone?" done":"")+"' onclick=\"openDetail('"+item.id+"')\">"+
"<div class='reqTop'>"+
"<div class='reqDate'>"+escapeHtml(item.requestDate||"-")+"</div>"+
"<button class='badge "+(isDone?"done":"pending")+"' onclick=\"event.stopPropagation();toggleStatusFromCard('"+item.id+"','"+(isDone?"未対応":"対応済み")+"')\">"+(isDone?"対応済み":"未対応")+"</button>"+
"</div>"+
"<div class='reqClient'>"+escapeHtml(item.client||"-")+"</div>"+
"<div class='reqContent'>"+escapeHtml(contentPreview(item))+"</div>"+
"</div>";
}

function toggleStatusFromCard(id,newStatus){
updateStatus(id,newStatus);
}

function loadRequests(){
colRef.orderBy("requestDate","desc").onSnapshot(function(snap){
requestCache=[];
snap.forEach(function(doc){
requestCache.push(Object.assign({id:doc.id},doc.data()));
});
renderLists();
checkAutoDelete();
},function(){
document.getElementById("pendingList").innerHTML="<div class='empty'>読み込みに失敗しました。通信を確認してください。</div>";
});
}

// ==== 詳細モーダル ====
function openDetail(id){
const item=requestCache.find(function(r){return r.id===id;});
if(!item)return;
currentDetailId=id;
const lines=buildSummaryLines(item);
const detailHtml=lines.map(function(line){
const idx=line.indexOf("：");
if(idx===-1)return "<div class='detailRow'>"+escapeHtml(line)+"</div>";
return "<div class='detailRow'><b>"+escapeHtml(line.slice(0,idx+1))+"</b>"+escapeHtml(line.slice(idx+1))+"</div>";
}).join("");
document.getElementById("modalBox").innerHTML=
detailHtml+
"<div class='shareBtnGrid'>"+
"<button class='shareBtn line' onclick=\"shareDetailLine('"+id+"')\">📱 ライン</button>"+
"<button class='shareBtn print' onclick=\"printDetail('"+id+"')\">🖨 印刷</button>"+
"</div>"+
"<button class='deleteBtn' onclick=\"deleteRequest('"+id+"')\">🗑 この依頼を削除</button>";
document.getElementById("modalScreen").classList.add("show");
}

function closeModal(){
document.getElementById("modalScreen").classList.remove("show");
currentDetailId=null;
}

function updateStatus(id,status){
const update={status:status};
if(status==="対応済み"){
update.respondedAt=firebase.firestore.FieldValue.serverTimestamp();
}else{
update.respondedAt=firebase.firestore.FieldValue.delete();
}
colRef.doc(id).update(update).catch(function(){
alert("更新に失敗しました。通信を確認してください。");
});
}

function deleteRequest(id){
if(!confirm("この依頼を削除します。よろしいですか？"))return;
colRef.doc(id).delete().then(function(){
closeModal();
}).catch(function(){
alert("削除に失敗しました。通信を確認してください。");
});
}

// ==== 2日後の自動削除 ====
function checkAutoDelete(){
const now=Date.now();
requestCache.forEach(function(item){
if(item.status==="対応済み" && item.respondedAt && typeof item.respondedAt.toMillis==="function"){
const respondedMs=item.respondedAt.toMillis();
if(now-respondedMs>=TWO_DAYS_MS){
colRef.doc(item.id).delete().catch(function(){});
}
}
});
}

// ==== 詳細画面からの共有 ====
function shareDetailLine(id){
const item=requestCache.find(function(r){return r.id===id;});
if(!item)return;
const text="【電話依頼】\n"+buildSummaryLines(item).join("\n");
const url="https://line.me/R/msg/text/?"+encodeURIComponent(text);
window.open(url,"_blank");
}

function shareDetailMail(id){
const item=requestCache.find(function(r){return r.id===id;});
if(!item)return;
const subject="電話依頼："+item.client;
const body=buildSummaryLines(item).join("\n");
const url="mailto:?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);
window.location.href=url;
}

function fillPrintBox(item){
const lines=buildSummaryLines(item);
document.getElementById("printBoxBody").innerHTML=lines.map(function(line){
const idx=line.indexOf("：");
if(idx===-1)return "<div>"+escapeHtml(line)+"</div>";
const label=line.slice(0,idx+1);
const rest=line.slice(idx+1).replace(/\n/g,"<br>");
return "<div><b>"+escapeHtml(label)+"</b>"+escapeHtml(rest)+"</div>";
}).join("");
}

function printDetail(id){
const item=requestCache.find(function(r){return r.id===id;});
if(!item)return;
fillPrintBox(item);
window.print();
}

function exportDetailPdf(id){
const item=requestCache.find(function(r){return r.id===id;});
if(!item)return;
fillPrintBox(item);
const printBox=document.getElementById("printBox");
const prevDisplay=printBox.style.display;
printBox.style.display="block";
html2canvas(printBox,{scale:2,backgroundColor:"#ffffff"}).then(function(canvas){
printBox.style.display=prevDisplay;
const {jsPDF}=window.jspdf;
const doc=new jsPDF("p","mm","a4");
const pageWidth=doc.internal.pageSize.getWidth();
const imgWidth=pageWidth-20;
const imgHeight=canvas.height*imgWidth/canvas.width;
const imgData=canvas.toDataURL("image/png");
doc.addImage(imgData,"PNG",10,10,imgWidth,imgHeight);
const fileName="電話依頼_"+(item.client||"未記入")+"_"+(item.requestDate||todayStr())+".pdf";
doc.save(fileName);
}).catch(function(){
printBox.style.display=prevDisplay;
alert("PDFの作成に失敗しました。");
});
}

// ==== 設定（入力フォーム）画面の開閉 ====
function openSettings(){
document.getElementById("settingsScreen").classList.add("show");
if(!document.getElementById("requestDate").value){
document.getElementById("requestDate").value=todayStr();
}
}

function closeSettings(){
document.getElementById("settingsScreen").classList.remove("show");
}

// ==== PWAインストール ====
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",function(e){
e.preventDefault();
deferredPrompt=e;
const btn=document.getElementById("installBtn");
if(btn)btn.style.display="block";
const iconBtn=document.getElementById("installIconBtn");
if(iconBtn)iconBtn.style.display="block";
});

function installApp(){
if(!deferredPrompt)return;
deferredPrompt.prompt();
deferredPrompt.userChoice.then(function(){
deferredPrompt=null;
const btn=document.getElementById("installBtn");
if(btn)btn.style.display="none";
const iconBtn=document.getElementById("installIconBtn");
if(iconBtn)iconBtn.style.display="none";
});
}

window.addEventListener("appinstalled",function(){
const btn=document.getElementById("installBtn");
if(btn)btn.style.display="none";
const iconBtn=document.getElementById("installIconBtn");
if(iconBtn)iconBtn.style.display="none";
});

document.addEventListener("DOMContentLoaded",function(){
loadStaff();
loadRequests();
if(window.matchMedia("(display-mode: standalone)").matches||window.navigator.standalone){
const btn=document.getElementById("installBtn");
if(btn)btn.style.display="none";
const iconBtn=document.getElementById("installIconBtn");
if(iconBtn)iconBtn.style.display="none";
}
});

if("serviceWorker" in navigator){
window.addEventListener("load",function(){
navigator.serviceWorker.register("service-worker.js").catch(function(){});
});
}
</script>
